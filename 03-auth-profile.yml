services:
  api-auth-profile-v1:
    image: jcar19/api-auth-profile-v1:1.0.1
    container_name: api-auth-profile-v1
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://pg-appointments:5432/db_appointment_management
      QUARKUS_DATASOURCE_USERNAME: postgres
      QUARKUS_DATASOURCE_PASSWORD: pgpass321
    networks:
      - appointment-net

networks:
  appointment-net:
    external: true